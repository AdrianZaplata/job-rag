name: Deploy SPA

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-spa.yml'

permissions:
  contents: read

# Phase 4 (D-03 / D-04) note: the 5 VITE_* secrets below MUST be set on the
# GitHub repo before the first SPA build can succeed. Adrian sets them
# out-of-band after `terraform apply` in infra/external/ produces the
# SPA + API client IDs and the API audience URI:
#
#   gh secret set VITE_TENANT_SUBDOMAIN --body "$(terraform -chdir=infra/bootstrap output -raw tenant_subdomain)"
#   gh secret set VITE_TENANT_ID        --body "$(terraform -chdir=infra/bootstrap output -raw tenant_id_external)"
#   gh secret set VITE_SPA_CLIENT_ID    --body "$(terraform -chdir=infra/external output -raw spa_client_id)"
#   gh secret set VITE_API_AUDIENCE     --body "$(terraform -chdir=infra/external output -raw api_audience_uri)"
#   gh secret set VITE_API_BASE_URL     --body "https://$(terraform -chdir=infra/envs/prod output -raw aca_fqdn)"
#
# All 5 values are public-by-design (visible in JWT iss/aud claims and the
# browser's network tab); they are kept as GitHub secrets only as a
# convenience grouping, not a security boundary.

jobs:
  build-and-deploy:
    name: build -> SWA upload
    runs-on: ubuntu-latest
    # NOTE: this workflow does NOT use OIDC — Azure/static-web-apps-deploy@v1
    # consumes the SWA api_key directly (CONTEXT.md A2 + D-08: SWA token is the
    # sole long-lived secret in the system; rotation cadence 180 days per
    # Microsoft default, refreshed via deploy-infra.yml's manual runbook reminder).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_TENANT_SUBDOMAIN: ${{ secrets.VITE_TENANT_SUBDOMAIN }}
          VITE_TENANT_ID:        ${{ secrets.VITE_TENANT_ID }}
          VITE_SPA_CLIENT_ID:    ${{ secrets.VITE_SPA_CLIENT_ID }}
          VITE_API_AUDIENCE:     ${{ secrets.VITE_API_AUDIENCE }}
          VITE_API_BASE_URL:     ${{ secrets.VITE_API_BASE_URL }}
          # Optional debug-page flag — set to 'true' to ship /debug/agent-stream in prod.
          VITE_DEBUG_PAGES:      ${{ secrets.VITE_DEBUG_PAGES }}

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'frontend/dist'
          skip_app_build: true
          skip_api_build: true
