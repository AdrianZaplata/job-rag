name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (pyright)
        run: uv run pyright src/

      - name: Test (pytest)
        run: uv run pytest -m "not eval"

      - name: Guard against DEFAULT on user_id columns
        run: |
          # Match Python kwarg `server_default=` (NOT bare prose mentions in docstrings)
          # OR raw SQL `user_id ... DEFAULT ... uuid` clauses inside op.execute() strings.
          if grep -rn --include='*.py' -E "user_id[^#\n]*server_default\s*=|user_id[^#\n]*DEFAULT[^#\n]*uuid" alembic/versions/ ; then
            echo "::error::Migration adds DEFAULT to user_id column — see decision D-08 / Pitfall 18"
            exit 1
          fi

      - name: Smoke-test alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
        run: |
          uv run alembic upgrade head
          uv run alembic upgrade head   # idempotent second run

      - name: Audit dependencies
        run: uv run pip-audit --ignore-vuln CVE-2025-69872 --ignore-vuln CVE-2026-6587  # CVE-2025-69872 diskcache 5.6.3 (no fix, transitive via ragas) + CVE-2026-6587 ragas 0.4.3 (no fix yet)

  # ─── Detect frontend presence (gate for frontend-ci) ──────────────────────────
  # `hashFiles()` is forbidden in job-level `if:` (workflow-validation-time
  # context — no checkout has run yet). The canonical workaround is a tiny
  # detect job that checks out the repo, emits a boolean output, and lets the
  # downstream job gate on `needs.detect-frontend.outputs.present`. Job-level
  # `if:` accepts `needs.*.outputs.*` because those values exist by the time
  # the dependent job is scheduled.
  detect-frontend:
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Frontend CI (Phase 4 Plan 04-03) ─────────────────────────────────────────
  # Sibling job to lint-and-test (no functional dependency — `needs:` here is
  # purely a gating mechanism for the file-presence guard). Skips cleanly when
  # frontend/package.json is absent (Wave 0 / pre-Plan-04 state). Codegen
  # drift-check (Phase 4 D-14) boots a temporary FastAPI against an ephemeral
  # postgres service, fetches /openapi.json, then asserts `git diff --exit-code
  # src/api/types.ts` after re-running openapi-typescript.
  frontend-ci:
    runs-on: ubuntu-latest
    needs: detect-frontend
    if: needs.detect-frontend.outputs.present == 'true'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck
        run: npm run typecheck
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Vitest
        run: npm run test -- --run
        working-directory: frontend

      # ─── Codegen drift-check (Phase 4 D-14) ──────────────────────────────────
      # Boot the FastAPI backend, fetch /openapi.json, compare against the
      # committed snapshot, then re-run openapi-typescript codegen against the
      # live spec and `git diff --exit-code` src/api/types.ts. Any drift =
      # backend schema changed without frontend types update → CI fails.
      - name: Install uv (for codegen-drift-check)
        uses: astral-sh/setup-uv@v4
        with:
          # Cache intentionally disabled: lint-and-test already populates the
          # uv cache for the same lockfile. Enabling it here causes the
          # post-action `uv cache prune --ci` to hang for 5min and fail when
          # the GH Actions cache service is flaky (observed run 26327302153).
          enable-cache: false

      - name: Set up Python (for codegen-drift-check)
        run: uv python install 3.12

      - name: Install backend dependencies (for codegen-drift-check)
        run: uv sync --frozen

      - name: Start FastAPI in background
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
          ALLOWED_ORIGINS: http://localhost:5173
          SEEDED_USER_ENTRA_OID: ""
          ENTRA_TENANT_ID: "00000000-0000-0000-0000-000000000000"
          ENTRA_TENANT_SUBDOMAIN: "jobrag"
          BACKEND_AUDIENCE: "api://00000000-0000-0000-0000-000000000000"
        run: |
          uv run alembic upgrade head
          uv run uvicorn job_rag.api.app:app --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8000/openapi.json >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/openapi.json > /tmp/openapi.live.json
          # Sanity: live OpenAPI must parse and contain components.
          python3 -c "import json; d=json.load(open('/tmp/openapi.live.json')); assert 'components' in d, 'OpenAPI missing components'"

      - name: Codegen drift-check (frontend/openapi.snapshot.json vs live)
        run: |
          # Compare ignoring formatting differences via canonical JSON dump.
          python3 -c "
          import json, sys
          live = json.load(open('/tmp/openapi.live.json'))
          snap = json.load(open('frontend/openapi.snapshot.json'))
          if json.dumps(live, sort_keys=True) != json.dumps(snap, sort_keys=True):
              print('::error::OpenAPI snapshot drift — update frontend/openapi.snapshot.json AND re-run codegen')
              sys.exit(1)
          print('OpenAPI snapshot matches live')
          "

      - name: Run openapi-typescript codegen + diff
        run: npm run codegen && git diff --exit-code src/api/types.ts
        working-directory: frontend
