name: Deploy infrastructure

on:
  push:
    branches: [master]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC handshake to Azure
  contents: read

jobs:
  apply:
    name: terraform apply (prod)
    runs-on: ubuntu-latest
    # Protected environment — Adrian as the sole required reviewer.
    # Federated credential matches subject "repo:<owner>/<repo>:environment:production"
    # (Plan 04 identity module's azuread_application_federated_identity_credential.production_env).
    environment: production
    defaults:
      run:
        working-directory: infra/envs/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}        # GHA app reg client_id (workforce tenant per A4)
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}        # workforce tenant ID
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false
        # Gap 8.C: azuread provider OIDC auth requires these TF vars at init time too
        # (init resolves provider auth when downloading provider plugins schemas).
        env:
          TF_VAR_gha_client_id:       ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id_workforce: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_use_oidc_auth:       "true"

      # ─── Phase 06.1 D-10 — auth vars CI-vs-local policy ─────────────────────
      # The Phase 4 D-04 auth vars (backend_audience, entra_tenant_id,
      # entra_tenant_subdomain) are INTENTIONALLY NOT managed by CI.
      #
      # Why:
      #   - They are sourced from infra/external/ Terraform outputs, which lives
      #     in Adrian's local-only TF flow (per Phase 4 D-02 — local state only,
      #     no remote backend). CI cannot run `terraform output -raw` against a
      #     state file it does not have access to.
      #   - Promoting them to GitHub Actions secrets would invert Phase 3 D-13
      #     (out-of-band-seeded values stay out of GH secrets) for no security
      #     gain — these values are public-by-design (visible in JWT claims) but
      #     the local-file convention is uniform across the Phase 4 D-04 set.
      #   - The values default to "" in infra/envs/prod/variables.tf, so an
      #     unprotected CI apply would silently wipe the ACA env vars and break
      #     Entra auth (Phase 06 UAT Bug #3).
      #
      # Protection: the step below asserts the live ACA container template still
      # has non-empty BACKEND_AUDIENCE / ENTRA_TENANT_ID / ENTRA_TENANT_SUBDOMAIN
      # env vars before running `terraform apply`. If any is empty, CI fails
      # closed — Adrian must run `bash scripts/tf-apply-prod.sh apply` locally
      # first (which loads prod.tfvars.local) to seed the values.
      #
      # Reference: infra/envs/prod/README.md "CI vs local: variable-source matrix"
      - name: Pre-apply guard — verify auth env vars present on live ACA
        run: |
          set -euo pipefail

          # Capture stdout and stderr separately so we can distinguish "container
          # does not exist" (legitimate first-apply path) from every other error
          # class (ResourceNotFound on the RG, AuthorizationFailed, AuthN failure,
          # transient ARM 5xx, az CLI crash, malformed query). The prior shape
          # `2>/dev/null || echo "[]"` swallowed every error and silently fell
          # through to the "skip the guard" branch — see Phase 06.1 CR-01.
          set +e
          ENV_JSON=$(az containerapp show \
            --name jobrag-prod-api \
            --resource-group jobrag-prod-rg \
            --query 'properties.template.containers[0].env' \
            -o json 2>/tmp/az-err)
          AZ_RC=$?
          set -e

          if [ $AZ_RC -ne 0 ]; then
            if grep -q "ResourceNotFound\|was not found" /tmp/az-err; then
              echo "::notice::Container app jobrag-prod-api not found — skipping pre-apply guard (first-apply path)."
              exit 0
            fi
            echo "::error::az containerapp show failed (rc=$AZ_RC). Refusing to apply on unknown live state." >&2
            cat /tmp/az-err >&2
            exit 1
          fi

          for VAR in BACKEND_AUDIENCE ENTRA_TENANT_ID ENTRA_TENANT_SUBDOMAIN; do
            # WR-04: accept both `.value` (plain literal) and `.secretRef` (KV-backed)
            # so a future refactor that promotes one of these vars to a KV-managed
            # secretRef does not silently misclassify it as empty.
            VAL=$(echo "$ENV_JSON" | jq -r ".[] | select(.name==\"$VAR\") | (.value // .secretRef // empty)")
            if [ -z "$VAL" ]; then
              echo "::error::Live ACA $VAR is empty. Refusing to apply — CI would re-wipe it. Run 'bash scripts/tf-apply-prod.sh apply' locally first to seed from prod.tfvars.local. See infra/envs/prod/README.md 'CI vs local: variable-source matrix' (Phase 06.1 D-10)." >&2
              exit 1
            fi
            echo "::notice::ACA $VAR present (length ${#VAL})"
          done

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=prod.tfvars
        # Option B: openai/langfuse secret VALUES are seeded out-of-band via
        # `az keyvault secret set ...` (see prod/README.md). TF only needs ghcr_pat
        # at apply time. OPENAI_API_KEY and LANGFUSE_* are NOT GitHub secrets.
        # Gap 8.C: TF_VAR_gha_client_id / tenant_id_workforce / use_oidc_auth flip
        # the azuread provider into OIDC auth on the CI runner (no Azure CLI dep).
        env:
          TF_VAR_home_ip:             ${{ secrets.HOME_IP }}
          TF_VAR_ghcr_pat:            ${{ secrets.GHCR_PAT }}
          TF_VAR_gha_client_id:       ${{ secrets.AZURE_CLIENT_ID }}
          TF_VAR_tenant_id_workforce: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_use_oidc_auth:       "true"

      # B2 (locked decision): SWA token sync is a MANUAL runbook step, NOT a workflow step.
      # Adrian runs `terraform output -raw swa_api_key | gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN_PROD --repo adrianzaplata/job-rag`
      # from his local terminal after first apply (and on token rotation, ~180 days).
      # Rationale: avoids the long-lived GH_PAT_FOR_SECRETS that would otherwise be needed.
      # See infra/envs/prod/README.md "Phase-close: GitHub secrets sync" for the runbook.

      # Capture outputs to job summary for runbook traceability.
      - name: Print non-sensitive outputs
        run: |
          {
            echo "## Terraform outputs"
            echo ""
            echo "| Output | Value |"
            echo "|--------|-------|"
            echo "| swa_default_origin | $(terraform output -raw swa_default_origin) |"
            echo "| aca_fqdn | $(terraform output -raw aca_fqdn) |"
            echo "| kv_name | $(terraform output -raw kv_name) |"
            # spa_app_client_id + api_app_client_id removed (Gap D, 2026-05-12):
            # External-tenant app registrations moved to a local-only ops surface.
            echo "| tenant_subdomain | $(terraform output -raw tenant_subdomain) |"
            echo ""
            echo "**Reminder (B2 manual runbook):** if the SWA was just created or rotated, run from your local terminal:"
            echo ""
            echo '```bash'
            echo "cd infra/envs/prod"
            echo "terraform output -raw swa_api_key | gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN_PROD --repo ${{ github.repository }}"
            echo '```'
            echo ""
            echo "See \`infra/envs/prod/README.md\` -> 'Phase-close: GitHub secrets sync' for full procedure (~180-day rotation cadence)."
          } >> "$GITHUB_STEP_SUMMARY"
